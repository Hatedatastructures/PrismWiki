# 代理组配置模板

**类别**: Mihomo 配置模板 | **文件**: proxy-groups.yaml

## 配置内容

```yaml
# mihomo 代理组配置模板
# 代理组用于组织代理节点和分流策略

# ========== 基础代理组配置 ==========
proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - node1
      - node2
      - DIRECT

# ========== 完整代理组配置 ==========
proxy-groups:
  # ========== 选择型代理组 ==========
  - name: "Proxy"
    type: select
    proxies:
      - Auto
      - Fallback
      - node1
      - node2
      - node3
      - DIRECT

  - name: "Streaming"
    type: select
    proxies:
      - Proxy
      - Auto
      - node1

  - name: "AdBlock"
    type: select
    proxies:
      - REJECT
      - DIRECT

  # ========== 自动选择代理组 ==========
  - name: "Auto"
    type: url-test
    proxies:
      - node1
      - node2
      - node3
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true
    filter: "node.*"       # 节点过滤

  # ========== 故障转移代理组 ==========
  - name: "Fallback"
    type: fallback
    proxies:
      - node1
      - node2
      - node3
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    lazy: true

  # ========== 负载均衡代理组 ==========
  - name: "LoadBalance"
    type: load-balancing
    proxies:
      - node1
      - node2
      - node3
    strategy: consistent-hashing
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  # ========== Relay 代理组 ==========
  - name: "Relay"
    type: relay
    proxies:
      - node1
      - node2
      # 流量顺序: node1 → node2 → 目标

# ========== 进程匹配代理组 ==========
proxy-groups:
  - name: "Browser"
    type: select
    proxies:
      - Proxy
      - DIRECT
    filter-mode: process
    filter: "chrome|firefox"

  - name: "Game"
    type: select
    proxies:
      - DIRECT
      - Auto
    filter-mode: process
    filter: "steam|game"

# ========== 使用 Provider ==========
proxy-providers:
  provider1:
    type: http
    url: "https://example.com/proxies.yaml"
    interval: 3600
    path: ./proxy-provider/provider1.yaml
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: "ProviderGroup"
    type: select
    use:
      - provider1
    proxies:
      - DIRECT

# ========== 带过滤器的代理组 ==========
proxy-groups:
  - name: "HK"
    type: url-test
    use:
      - provider1
    filter: "香港|HK|Hong Kong"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "US"
    type: url-test
    use:
      - provider1
    filter: "美国|US|United States"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "JP"
    type: url-test
    use:
      - provider1
    filter: "日本|JP|Japan"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

# ========== 排除配置 ==========
proxy-groups:
  - name: "AutoExclude"
    type: url-test
    proxies:
      - node1
      - node2
      - node3
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    exclude-filter: "过期|expire"
    exclude-type: "ShadowsocksR"
```

## 代理组类型

| 类型 | 说明 | 适用场景 |
|------|------|----------|
| select | 手动选择 | 默认代理组 |
| url-test | 自动测速选择 | 自动优选 |
| fallback | 故障转移 | 高可用 |
| load-balancing | 负载均衡 | 高流量 |
| relay | 链式代理 | 多跳 |

## url-test 参数

| 参数 | 类型 | 默认值 | 说明 |
|------|------|--------|------|
| url | string | - | 测速 URL |
| interval | int | 300 | 测速间隔（秒） |
| tolerance | int | 50 | 容差（ms） |
| lazy | bool | true | 懒加载 |

## fallback 参数

| 参数 | 类型 | 默认值 | 说明 |
|------|------|--------|------|
| url | string | - | 检测 URL |
| interval | int | 300 | 检测间隔 |
| lazy | bool | true | 懒加载 |

## load-balancing 参数

| 参数 | 类型 | 说明 |
|------|------|------|
| strategy | string | consistent-hashing / round-robin |

